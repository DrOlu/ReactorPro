name: Notify Multica on Release
on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Multica autopilot
        env:
          WEBHOOK_URL: https://api.multica.ai/api/webhooks/autopilots/awt_uHjFqZDOJhQ_u5H5rF6dlgS1IM2Ndxb-s5C_0NhUo6c
          TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          REPO_FULL: ${{ github.repository }}
          REPO_NAME: ${{ github.event.repository.name }}
          ACTOR: ${{ github.actor }}
        run: |
          curl -s -X POST "$WEBHOOK_URL" -H 'Content-Type: application/json' -d '{
            "action": "published",
            "release": {
              "tag_name": "'"$TAG_NAME"'",
              "name": "'"$RELEASE_NAME"'",
              "draft": false,
              "prerelease": false
            },
            "repository": {
              "full_name": "'"$REPO_FULL"'",
              "name": "'"$REPO_NAME"'"
            },
            "sender": {
              "login": "'"$ACTOR"'"
            }
          }'
