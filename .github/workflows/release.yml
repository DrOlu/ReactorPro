name: Release

on:
  workflow_dispatch: # Manual trigger
  workflow_call: # Called by sync-upstream workflow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-docker:
    name: Release Docker image
    uses: ./.github/workflows/release-docker.yml
    secrets: inherit

  release-linux:
    name: Release Linux packages
    runs-on: ubuntu-latest
    container:
      image: electronuserland/builder
      env:
        TAR_OPTIONS: "--format=ustar"
        GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - uses: "actions/checkout@v4"
        with:
          ref: main

      - uses: "actions/setup-node@v4"
        with:
          node-version: '22.17.0'

      - run: npm install --arch=x64

      - name: Release Linux
        run: npm run build:linux -- --x64 -p always

      - name: Remove broken apt sources (packagecloud.io 403)
        run: rm -f /etc/apt/sources.list.d/*git-lfs* /etc/apt/sources.list.d/*packagecloud* || true
      - name: Install GitHub CLI
        run: |
          apt-get update
          apt-get install -y --no-install-recommends gh ca-certificates

      - name: Mark repository as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Upload backwards compatible x64 AppImage (no x64 suffix)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          APPIMAGE_ARCH=$(ls -1 dist/*.AppImage | grep -E -- '-(x64|x86_64)\.AppImage$' | head -n 1)
          if [ -z "$APPIMAGE_ARCH" ]; then
            echo "Could not find x64 AppImage in dist/" >&2
            ls -la dist
            exit 1
          fi

          APPIMAGE_COMPAT="$APPIMAGE_ARCH"
          APPIMAGE_COMPAT="${APPIMAGE_COMPAT%-x64.AppImage}"
          APPIMAGE_COMPAT="${APPIMAGE_COMPAT%-x86_64.AppImage}.AppImage"
          cp "$APPIMAGE_ARCH" "$APPIMAGE_COMPAT"

          echo "Created compat AppImage: $APPIMAGE_COMPAT"

          REPO="${GITHUB_REPOSITORY}"
          RELEASE_TAG=$(curl -fsSL \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases" \
            | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const r=JSON.parse(s).find(x=>x.draft); if(!r){process.exit(1)}; console.log(r.tag_name)})")
          if [ -z "$RELEASE_TAG" ]; then
            echo "Could not find draft release tag" >&2
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "$APPIMAGE_COMPAT" --clobber

      - name: Add compat AppImage entry to latest-linux.yml and upload to release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Update latest-linux.yml with compat AppImage entry.
          # Uses node (always available in electronuserland/builder) and
          # js-yaml installed via npm. Avoids shell heredocs which are
          # invalid inside YAML run blocks (YAML treats << as merge key).
          npm install --no-save js-yaml 2>/dev/null
          node -e "
            const fs = require('fs');
            const yaml = require('js-yaml');
            const ymlPath = 'dist/latest-linux.yml';
            const data = yaml.load(fs.readFileSync(ymlPath, 'utf8'));
            const files = data.files || [];
            const appImage = files.find(f => f.url && f.url.endsWith('.AppImage'));
            if (!appImage) { console.error('No AppImage entry found'); process.exit(1); }
            const compatUrl = appImage.url.replace(/-(x64|x86_64)\.AppImage$/, '.AppImage');
            if (compatUrl === appImage.url) { console.log('No x64 suffix to strip, skipping'); process.exit(0); }
            files.push({ ...appImage, url: compatUrl });
            data.files = files;
            data.path = compatUrl;
            data.sha512 = appImage.sha512;
            fs.writeFileSync(ymlPath, yaml.dump(data));
            console.log('Updated latest-linux.yml with compat AppImage entry');
          " 

          # Upload updated latest-linux.yml to release
          REPO="${GITHUB_REPOSITORY}"
          RELEASE_TAG=$(curl -fsSL \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases" \
            | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const r=JSON.parse(s).find(x=>x.draft); if(!r){process.exit(1)}; console.log(r.tag_name)})")

          if [ -z "$RELEASE_TAG" ]; then
            echo "Could not find draft release tag" >&2
            exit 1
          fi

          gh release upload "$RELEASE_TAG" dist/latest-linux.yml --clobber

  release-linux-arm64:
    name: Release Linux ARM64 packages
    runs-on: ubuntu-22.04-arm
    env:
      TAR_OPTIONS: "--format=ustar"
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - uses: "actions/checkout@v4"
        with:
          ref: main

      - uses: "actions/setup-node@v4"
        with:
          node-version: '22.17.0'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools \
            rpm \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            libasound2 \
            libgbm1 \
            libx11-xcb1 \
            libdrm2 \
            libxkbcommon0 \
            libxrandr2 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxi6 \
            libxtst6 \
            xdg-utils

      - name: Install FPM
        run: |
          sudo apt-get update
          sudo apt-get install ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - run: npm install --arch=arm64

      - name: Release Linux ARM64
        env:
          USE_SYSTEM_FPM: true
        run: npm run build:linux -- --arm64 -p always

  release-win:
    name: Release Windows packages
    runs-on: windows-2022
    outputs:
      release_tag: ${{ steps.get_tag.outputs.release_tag }}

    steps:
      - name: Preserve $HOME set in the container
        run: echo HOME=/root >> "$GITHUB_ENV"

      - uses: "actions/checkout@v4"
        with:
          ref: main

      - uses: "actions/setup-node@v4"
        with:
          node-version: '22.17.0'

      - name: Configure node-gyp for Windows runner
        shell: pwsh
        run: |
          # Help node-gyp find Visual Studio on newer runner images
          # where node-gyp's built-in VS detection may not recognize the installed version.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            $vsPath = & $vswhere -latest -property installationPath 2>$null
            if ($vsPath) {
              echo "GYP_MSVS_OVERRIDE_PATH=$vsPath" >> $env:GITHUB_ENV
              echo "Found VS at: $vsPath"
            }
            $vsYear = & $vswhere -latest -property catalog_productLineVersion 2>$null
            if ($vsYear -match '^\d{4}') {
              $msvsVersion = $vsYear.Substring(0, 4)
              echo "GYP_MSVS_VERSION=$msvsVersion" >> $env:GITHUB_ENV
              echo "Using MSVS version: $msvsVersion"
            } else {
              # Fallback: try common version identifiers
              echo "GYP_MSVS_VERSION=2022" >> $env:GITHUB_ENV
              echo "Using fallback MSVS version: 2022"
            }
          } else {
            echo "vswhere not found, setting fallback values"
            echo "GYP_MSVS_VERSION=2022" >> $env:GITHUB_ENV
          }

      - run: npm install

      - name: Release Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build && npx electron-builder --win -p always

      - name: Get release tag
        id: get_tag
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Get the draft release tag for AV scan trigger
          RELEASE_TAG=$(gh release list --limit 10 --json tagName,isDraft --jq '.[] | select(.isDraft == true) | .tagName' | head -n 1)
          if [ -z "$RELEASE_TAG" ]; then
            # If no draft, get latest release
            RELEASE_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          fi
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "Release tag for AV scan: $RELEASE_TAG"

  release-macos-x64:
    name: Release macOS x64 packages
    runs-on: macos-latest

    steps:
      - uses: "actions/checkout@v4"
        with:
          ref: main

      - uses: "actions/setup-node@v4"
        with:
          node-version: '22.17.0'

      - run: npm install --arch=x64

      - name: Setup macOS signing keychain
        env:
          SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          if [ -z "$SIGNING_CERT_BASE64" ] || [ -z "$SIGNING_KEY_BASE64" ]; then
            echo "No signing secrets, will build unsigned"
            exit 0
          fi
          set -eo pipefail
          CERT_PATH="$RUNNER_TEMP/hyperspace.crt"
          KEY_PATH="$RUNNER_TEMP/hyperspace.key"
          echo "$SIGNING_CERT_BASE64" | base64 -d > "$CERT_PATH"
          echo "$SIGNING_KEY_BASE64" | base64 -d > "$KEY_PATH"

          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="temp_keychain_$(date +%s)"

          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          P12_PATH="$RUNNER_TEMP/hyperspace.p12"
          openssl pkcs12 -export -out "$P12_PATH" -inkey "$KEY_PATH" -in "$CERT_PATH" -passout pass:temp -legacy 2>/dev/null || \
          openssl pkcs12 -export -out "$P12_PATH" -inkey "$KEY_PATH" -in "$CERT_PATH" -passout pass:temp

          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "temp" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" 2>/dev/null || true
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build macOS x64 (unpacked)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npm run build && npx electron-builder --mac --x64 --dir

      - name: Re-sign macOS x64 app bundle
        run: |
          APP_PATH=$(find dist/mac* -name "*.app" -maxdepth 1 -type d | head -1)
          echo "Re-signing: $APP_PATH"
          codesign --deep --force --sign - "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH" && echo "Signature OK" || echo "Warning: verification issue"

      - name: Package and publish macOS x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          APP_PATH=$(find dist/mac* -name "*.app" -maxdepth 1 -type d | head -1)
          npx electron-builder --mac --x64 -p always --prepackaged "$APP_PATH"

      - name: Upload latest-mac.yml artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-mac-x64-yml
          path: dist/latest-mac.yml

  release-macos-arm64:
    name: Release macOS arm64 packages
    runs-on: macos-15

    steps:
      - uses: "actions/checkout@v4"
        with:
          ref: main

      - uses: "actions/setup-node@v4"
        with:
          node-version: '22.17.0'

      - run: npm install --arch=arm64

      - name: Setup macOS signing keychain
        env:
          SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          if [ -z "$SIGNING_CERT_BASE64" ] || [ -z "$SIGNING_KEY_BASE64" ]; then
            echo "No signing secrets, will build unsigned"
            exit 0
          fi
          set -eo pipefail
          CERT_PATH="$RUNNER_TEMP/hyperspace.crt"
          KEY_PATH="$RUNNER_TEMP/hyperspace.key"
          echo "$SIGNING_CERT_BASE64" | base64 -d > "$CERT_PATH"
          echo "$SIGNING_KEY_BASE64" | base64 -d > "$KEY_PATH"

          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="temp_keychain_$(date +%s)"

          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          P12_PATH="$RUNNER_TEMP/hyperspace.p12"
          openssl pkcs12 -export -out "$P12_PATH" -inkey "$KEY_PATH" -in "$CERT_PATH" -passout pass:temp -legacy 2>/dev/null || \
          openssl pkcs12 -export -out "$P12_PATH" -inkey "$KEY_PATH" -in "$CERT_PATH" -passout pass:temp

          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "temp" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" 2>/dev/null || true
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build macOS arm64 (unpacked)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npm run build && npx electron-builder --mac --arm64 --dir

      - name: Re-sign macOS arm64 app bundle
        run: |
          APP_PATH=$(find dist/mac* -name "*.app" -maxdepth 1 -type d | head -1)
          echo "Re-signing: $APP_PATH"
          codesign --deep --force --sign - "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH" && echo "Signature OK" || echo "Warning: verification issue"

      - name: Package and publish macOS arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          APP_PATH=$(find dist/mac* -name "*.app" -maxdepth 1 -type d | head -1)
          npx electron-builder --mac --arm64 -p always --prepackaged "$APP_PATH"

      - name: Upload latest-mac.yml artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-mac-arm64-yml
          path: dist/latest-mac.yml

  combine-macos-yml:
    name: Combine macOS yml files
    runs-on: ubuntu-latest
    needs: [release-macos-x64, release-macos-arm64]

    steps:
      - uses: "actions/checkout@v4"
        with:
          ref: main

      - uses: "actions/setup-node@v4"
        with:
          node-version: '22.17.0'

      - name: Download x64 yml artifact
        uses: actions/download-artifact@v4
        with:
          name: latest-mac-x64-yml
          path: artifacts/x64/

      - name: Download arm64 yml artifact
        uses: actions/download-artifact@v4
        with:
          name: latest-mac-arm64-yml
          path: artifacts/arm64/

      - name: Combine yml files
        run: |
          cat > combine-yml.js << 'EOF'
          const fs = require('fs');
          const yaml = require('js-yaml');

          // Read both yml files
          const x64Content = fs.readFileSync('artifacts/x64/latest-mac.yml', 'utf8');
          const arm64Content = fs.readFileSync('artifacts/arm64/latest-mac.yml', 'utf8');

          // Parse yml content
          const x64Data = yaml.load(x64Content);
          const arm64Data = yaml.load(arm64Content);

          // Combine files arrays
          const combinedData = {
            ...arm64Data,
            files: [...x64Data.files, ...arm64Data.files]
          };

          // Write combined yml
          fs.writeFileSync('latest-mac.yml', yaml.dump(combinedData));
          console.log('Combined yml file created successfully');
          EOF

          # Install js-yaml in an isolated prefix so npm does NOT resolve the
          # repo's package.json (which pulls electron/esbuild and fails the
          # esbuild postinstall with ETXTBSY on the ubuntu runner).
          npm install --prefix /tmp/combine js-yaml
          NODE_PATH=/tmp/combine/node_modules node combine-yml.js

      - name: Find draft release tag
        id: find-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Get the draft release tag
          RELEASE_TAG=$(gh release list --limit 1 --json tagName,isDraft --jq '.[] | select(.isDraft == true) | .tagName')
          if [ -z "$RELEASE_TAG" ]; then
            echo "No draft release found, will skip upload"
            echo "has_release=false" >> $GITHUB_OUTPUT
          else
            echo "Found draft release: $RELEASE_TAG"
            echo "has_release=true" >> $GITHUB_OUTPUT
            echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Upload combined yml to release
        if: steps.find-release.outputs.has_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Upload the combined latest-mac.yml to the GitHub release
          gh release upload ${{ steps.find-release.outputs.release_tag }} latest-mac.yml --clobber

  trigger-av-scan:
    name: Trigger AV Scan
    needs: [release-win, combine-macos-yml]
    runs-on: ubuntu-latest
    # This step requires a PAT with workflow permission, GITHUB_TOKEN doesn't have it
    continue-on-error: true
    steps:
      - name: Trigger AV Scan workflow
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT || secrets.GH_TOKEN }}
        run: |
          RELEASE_TAG="${{ needs.release-win.outputs.release_tag }}"
          if [ -z "$RELEASE_TAG" ]; then
            echo "No release tag found, cannot trigger AV scan"
            exit 0
          fi
          
          echo "Attempting to trigger AV scan workflow for tag: $RELEASE_TAG"
          gh workflow run av-scan.yml \
            --repo ${{ github.repository }} \
            --ref main \
            -f tag="$RELEASE_TAG" || \
          echo "Note: AV scan trigger requires REPO_PAT secret with workflow scope. Run manually if needed."

  publish-release:
    name: Publish draft release
    # Run after every platform has finished uploading its artifacts and the
    # macOS latest.yml has been combined. The build jobs use
    # `electron-builder -p always`, which leaves the GitHub Release in
    # draft state. We flip it to a full published release here so:
    #   * the `release: published` event fires
    #   * the Notify Multica on Release workflow triggers
    #   * users see the new version on the Releases page immediately
    needs:
      - release-linux
      - release-linux-arm64
      - release-win
      - release-macos-x64
      - release-macos-arm64
      - combine-macos-yml
      - release-docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          RELEASE_TAG=$(gh release list \
            --repo "$REPO" \
            --limit 10 \
            --json tagName,isDraft \
            --jq '.[] | select(.isDraft == true) | .tagName' \
            | head -n 1)
          if [ -z "${RELEASE_TAG:-}" ]; then
            echo "No draft release found — nothing to publish."
            exit 0
          fi
          echo "Publishing draft release: $RELEASE_TAG"
          gh release edit "$RELEASE_TAG" \
            --repo "$REPO" \
            --draft=false \
            --latest
          echo "Done. Release $RELEASE_TAG is now published and marked latest."
