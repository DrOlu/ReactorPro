name: AV Scan & Whitelist

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to scan (e.g., v0.8.1)'
        required: true
        type: string

permissions:
  contents: read

env:
  VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}

jobs:
  scan-virustotal:
    name: VirusTotal Scan
    runs-on: ubuntu-latest
    outputs:
      scan_results: ${{ steps.scan.outputs.results }}
      has_detections: ${{ steps.scan.outputs.has_detections }}
    steps:
      - name: Get release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Download release assets
        run: |
          mkdir -p assets
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo ${{ github.repository }} \
            --pattern "*.exe" \
            --pattern "*win*.zip" \
            --dir assets || echo "No matching assets found"
          ls -la assets/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Submit to VirusTotal
        id: scan
        run: |
          if [ -z "$VT_API_KEY" ]; then
            echo "::warning::VIRUSTOTAL_API_KEY not set, skipping scan"
            echo "results=[]" >> $GITHUB_OUTPUT
            echo "has_detections=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          RESULTS="[]"
          HAS_DETECTIONS="false"
          
          # Scan each file
          for file in assets/*; do
            [ -f "$file" ] || continue
            FILENAME=$(basename "$file")
            echo "Submitting $FILENAME to VirusTotal..."
            
            # Upload file
            RESPONSE=$(curl -s --request POST \
              --url 'https://www.virustotal.com/api/v3/files' \
              --header "x-apikey: $VT_API_KEY" \
              --form file=@"$file")
            
            ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.data.id // empty')
            
            if [ -n "$ANALYSIS_ID" ]; then
              echo "Analysis ID: $ANALYSIS_ID"
              
              # Wait for analysis (max 5 minutes)
              for i in {1..30}; do
                sleep 10
                ANALYSIS=$(curl -s \
                  --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
                  --header "x-apikey: $VT_API_KEY")
                
                STATUS=$(echo "$ANALYSIS" | jq -r '.data.attributes.status')
                echo "Status: $STATUS"
                
                if [ "$STATUS" = "completed" ]; then
                  STATS=$(echo "$ANALYSIS" | jq -c '.data.attributes.stats')
                  MALICIOUS=$(echo "$ANALYSIS" | jq -r '.data.attributes.stats.malicious // 0')
                  SUSPICIOUS=$(echo "$ANALYSIS" | jq -r '.data.attributes.stats.suspicious // 0')
                  
                  echo "Results for $FILENAME: $STATS"
                  
                  if [ "$MALICIOUS" -gt 0 ] || [ "$SUSPICIOUS" -gt 0 ]; then
                    HAS_DETECTIONS="true"
                    echo "::warning::$FILENAME has $MALICIOUS malicious and $SUSPICIOUS suspicious detections"
                  else
                    echo "::notice::$FILENAME is clean (0 detections)"
                  fi
                  
                  # Get SHA256 for the file
                  SHA256=$(sha256sum "$file" | awk '{print $1}')
                  VT_LINK="https://www.virustotal.com/gui/file/$SHA256"
                  
                  RESULT=$(jq -n \
                    --arg name "$FILENAME" \
                    --arg sha256 "$SHA256" \
                    --arg link "$VT_LINK" \
                    --argjson stats "$STATS" \
                    '{name: $name, sha256: $sha256, link: $link, stats: $stats}')
                  
                  RESULTS=$(echo "$RESULTS" | jq --argjson r "$RESULT" '. += [$r]')
                  break
                fi
              done
            else
              echo "::error::Failed to submit $FILENAME"
              echo "$RESPONSE"
            fi
          done
          
          echo "results<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "has_detections=$HAS_DETECTIONS" >> $GITHUB_OUTPUT

      - name: Create scan report
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          RESULTS='${{ steps.scan.outputs.results }}'
          
          echo "# VirusTotal Scan Report" > scan-report.md
          echo "" >> scan-report.md
          echo "**Release:** $TAG" >> scan-report.md
          echo "**Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> scan-report.md
          echo "" >> scan-report.md
          echo "## Results" >> scan-report.md
          echo "" >> scan-report.md
          echo "| File | Malicious | Suspicious | Harmless | Undetected | Link |" >> scan-report.md
          echo "|------|-----------|------------|----------|------------|------|" >> scan-report.md
          
          echo "$RESULTS" | jq -r '.[] | "| \(.name) | \(.stats.malicious // 0) | \(.stats.suspicious // 0) | \(.stats.harmless // 0) | \(.stats.undetected // 0) | [View](\(.link)) |"' >> scan-report.md
          
          echo "" >> scan-report.md
          echo "---" >> scan-report.md
          echo "*Automated scan by ReactorPro CI/CD*" >> scan-report.md
          
          cat scan-report.md
          
      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: virustotal-scan-report
          path: scan-report.md

  submit-av-vendors:
    name: Submit to AV Vendors
    runs-on: ubuntu-latest
    needs: scan-virustotal
    if: needs.scan-virustotal.outputs.has_detections == 'true'
    steps:
      - name: Get release info
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "url=https://github.com/${{ github.repository }}/releases/tag/$TAG" >> $GITHUB_OUTPUT

      - name: Download Windows executable
        run: |
          mkdir -p assets
          gh release download "${{ steps.release.outputs.tag }}" \
            --repo ${{ github.repository }} \
            --pattern "*win-x64.zip" \
            --dir assets
          
          # Extract to get exe
          cd assets
          unzip -o *win-x64.zip || true
          find . -name "*.exe" -type f | head -1
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate submission info
        id: info
        run: |
          EXE=$(find assets -name "*.exe" -type f | head -1)
          if [ -z "$EXE" ]; then
            echo "::error::No executable found"
            exit 1
          fi
          
          SHA256=$(sha256sum "$EXE" | awk '{print $1}')
          MD5=$(md5sum "$EXE" | awk '{print $1}')
          SHA1=$(sha1sum "$EXE" | awk '{print $1}')
          SIZE=$(stat -c%s "$EXE")
          FILENAME=$(basename "$EXE")
          
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "md5=$MD5" >> $GITHUB_OUTPUT
          echo "sha1=$SHA1" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Submit to Microsoft Defender (WDSI)
        if: env.MICROSOFT_WDSI_API_KEY != ''
        env:
          MICROSOFT_WDSI_API_KEY: ${{ secrets.MICROSOFT_WDSI_API_KEY }}
        run: |
          echo "::notice::Microsoft Defender submission requires manual upload at https://www.microsoft.com/en-us/wdsi/filesubmission"
          echo "SHA256: ${{ steps.info.outputs.sha256 }}"

      - name: Submit to Kaspersky OpenTIP
        run: |
          # Kaspersky OpenTIP accepts hash lookups
          SHA256="${{ steps.info.outputs.sha256 }}"
          echo "Checking Kaspersky OpenTIP for $SHA256..."
          
          RESPONSE=$(curl -s "https://opentip.kaspersky.com/api/v1/search/hash?request=$SHA256" \
            -H "Accept: application/json" || echo "{}")
          
          echo "Kaspersky response: $RESPONSE"
          echo "::notice::Submit false positive at https://opentip.kaspersky.com/"

      - name: Create submission report
        run: |
          cat << EOF > av-submission-report.md
          # AV Vendor Submission Report
          
          **Release:** ${{ steps.release.outputs.tag }}
          **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          ## File Information
          
          | Property | Value |
          |----------|-------|
          | Filename | ${{ steps.info.outputs.filename }} |
          | SHA256 | ${{ steps.info.outputs.sha256 }} |
          | SHA1 | ${{ steps.info.outputs.sha1 }} |
          | MD5 | ${{ steps.info.outputs.md5 }} |
          | Size | ${{ steps.info.outputs.size }} bytes |
          | Download | ${{ steps.release.outputs.url }} |
          
          ## Manual Submission Required
          
          The following vendors require manual submission:
          
          | Vendor | URL | Status |
          |--------|-----|--------|
          | Microsoft Defender | https://www.microsoft.com/en-us/wdsi/filesubmission | Pending |
          | Google Safe Browsing | https://safebrowsing.google.com/safebrowsing/report_error/ | Pending |
          | Norton/Symantec | https://submit.norton.com/ | Pending |
          | McAfee | https://www.mcafee.com/enterprise/en-us/threat-center/threat-feedback.html | Pending |
          | Avast/AVG | https://www.avast.com/false-positive-file-form.php | Pending |
          | Bitdefender | https://www.bitdefender.com/submit/ | Pending |
          | ESET | https://support.eset.com/en/kb141 | Pending |
          | Trend Micro | https://www.trendmicro.com/en_us/about/legal/detection-reevaluation.html | Pending |
          | Malwarebytes | https://www.malwarebytes.com/support/fp | Pending |
          
          ## Submission Template
          
          Use this text when submitting:
          
          ---
          
          **Subject:** False Positive Report - ReactorPro Desktop Application
          
          **Body:**
          
          The file "${{ steps.info.outputs.filename }}" (SHA256: ${{ steps.info.outputs.sha256 }}) is being incorrectly detected as malicious. This is a false positive.
          
          ReactorPro is a legitimate, open-source AI coding assistant for developers.
          - GitHub: https://github.com/${{ github.repository }}
          - Website: https://reactorpro.ng
          - Vendor: Hyperspace Technologies
          - License: MIT (Open Source)
          
          The application is digitally signed and built via automated CI/CD.
          Please review and whitelist this software.
          
          Thank you.
          
          ---
          EOF
          
          cat av-submission-report.md

      - name: Upload submission report
        uses: actions/upload-artifact@v4
        with:
          name: av-submission-report
          path: av-submission-report.md

      - name: Create issue for manual submissions
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_BODY=$(cat << 'EOF'
          ## AV False Positive Submissions Required
          
          Release **${{ steps.release.outputs.tag }}** has been flagged by some antivirus engines.
          
          ### File Details
          - **SHA256:** `${{ steps.info.outputs.sha256 }}`
          - **Download:** ${{ steps.release.outputs.url }}
          
          ### Submission Checklist
          
          Please submit to each vendor and check off when done:
          
          - [ ] [Microsoft Defender](https://www.microsoft.com/en-us/wdsi/filesubmission)
          - [ ] [Google Safe Browsing](https://safebrowsing.google.com/safebrowsing/report_error/)
          - [ ] [Norton/Symantec](https://submit.norton.com/)
          - [ ] [McAfee](https://www.mcafee.com/enterprise/en-us/threat-center/threat-feedback.html)
          - [ ] [Kaspersky](https://opentip.kaspersky.com/)
          - [ ] [Avast/AVG](https://www.avast.com/false-positive-file-form.php)
          - [ ] [Bitdefender](https://www.bitdefender.com/submit/)
          - [ ] [ESET](https://support.eset.com/en/kb141)
          - [ ] [Trend Micro](https://www.trendmicro.com/en_us/about/legal/detection-reevaluation.html)
          - [ ] [Malwarebytes](https://www.malwarebytes.com/support/fp)
          
          EOF
          )
          
          gh issue create \
            --repo ${{ github.repository }} \
            --title "AV Whitelist Submissions for ${{ steps.release.outputs.tag }}" \
            --body "$ISSUE_BODY" \
            --label "av-whitelist"

  notify-clean:
    name: Notify Clean Scan
    runs-on: ubuntu-latest
    needs: scan-virustotal
    if: needs.scan-virustotal.outputs.has_detections == 'false'
    steps:
      - name: Report clean scan
        run: |
          echo "::notice::All files passed VirusTotal scan with 0 detections!"
          echo "No AV vendor submissions required."
