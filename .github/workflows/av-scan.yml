name: AV Scan & Whitelist

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to scan (e.g., v0.8.1)'
        required: true
        type: string
      send_emails:
        description: 'Send automated emails to AV vendors'
        required: false
        type: boolean
        default: false
      priority_filter:
        description: 'Only email vendors of this priority or higher'
        required: false
        type: choice
        default: 'high'
        options:
          - critical
          - high
          - medium
          - low

permissions:
  contents: write
  issues: write

env:
  VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
  AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
  SENDER_EMAIL: reactor@cyberagent.ng

jobs:
  scan-virustotal:
    name: VirusTotal Scan
    runs-on: ubuntu-latest
    outputs:
      scan_results: ${{ steps.scan.outputs.results }}
      has_detections: ${{ steps.scan.outputs.has_detections }}
    steps:
      - name: Get release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Get release asset URLs
        id: assets
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          
          # Get Windows asset URLs
          ASSETS=$(gh release view "$TAG" --repo ${{ github.repository }} --json assets \
            --jq '[.assets[] | select(.name | test("win.*\\.zip$|.*\\.exe$")) | {name: .name, url: .url}]')
          
          echo "assets<<EOF" >> $GITHUB_OUTPUT
          echo "$ASSETS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "Found assets:"
          echo "$ASSETS" | jq -r '.[].name'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Submit URLs to VirusTotal
        id: scan
        run: |
          set +e  # Don't exit on errors
          
          if [ -z "$VT_API_KEY" ]; then
            echo "::warning::VIRUSTOTAL_API_KEY not set, skipping scan"
            echo "results=[]" >> $GITHUB_OUTPUT
            echo "has_detections=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          TAG="${{ steps.tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          RESULTS="[]"
          HAS_DETECTIONS="false"
          
          # Parse assets
          ASSETS='${{ steps.assets.outputs.assets }}'
          
          echo "$ASSETS" | jq -r '.[] | @base64' | while read -r asset_b64; do
            ASSET=$(echo "$asset_b64" | base64 -d)
            NAME=$(echo "$ASSET" | jq -r '.name')
            
            # Construct download URL
            DOWNLOAD_URL="https://github.com/$REPO/releases/download/$TAG/$NAME"
            
            echo "=========================================="
            echo "Scanning: $NAME"
            echo "URL: $DOWNLOAD_URL"
            
            # Submit URL to VirusTotal
            RESPONSE=$(curl -s --request POST \
              --url 'https://www.virustotal.com/api/v3/urls' \
              --header "x-apikey: $VT_API_KEY" \
              --header "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "url=$DOWNLOAD_URL" 2>&1)
            
            ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.data.id // empty' 2>/dev/null)
            
            if [ -n "$ANALYSIS_ID" ] && [ "$ANALYSIS_ID" != "null" ]; then
              echo "Analysis ID: $ANALYSIS_ID"
              
              # Wait for analysis (max 2 minutes per URL)
              for i in {1..12}; do
                sleep 10
                ANALYSIS=$(curl -s \
                  --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
                  --header "x-apikey: $VT_API_KEY" 2>&1)
                
                STATUS=$(echo "$ANALYSIS" | jq -r '.data.attributes.status // "unknown"' 2>/dev/null)
                echo "Status: $STATUS"
                
                if [ "$STATUS" = "completed" ]; then
                  MALICIOUS=$(echo "$ANALYSIS" | jq -r '.data.attributes.stats.malicious // 0' 2>/dev/null)
                  SUSPICIOUS=$(echo "$ANALYSIS" | jq -r '.data.attributes.stats.suspicious // 0' 2>/dev/null)
                  HARMLESS=$(echo "$ANALYSIS" | jq -r '.data.attributes.stats.harmless // 0' 2>/dev/null)
                  UNDETECTED=$(echo "$ANALYSIS" | jq -r '.data.attributes.stats.undetected // 0' 2>/dev/null)
                  
                  echo "Results: malicious=$MALICIOUS, suspicious=$SUSPICIOUS, harmless=$HARMLESS, undetected=$UNDETECTED"
                  
                  if [ "$MALICIOUS" -gt 0 ] 2>/dev/null || [ "$SUSPICIOUS" -gt 0 ] 2>/dev/null; then
                    echo "HAS_DETECTIONS=true" >> $GITHUB_ENV
                    echo "::warning::$NAME has $MALICIOUS malicious and $SUSPICIOUS suspicious detections"
                  else
                    echo "::notice::$NAME is clean (0 detections)"
                  fi
                  
                  # Store result
                  echo "$NAME|$MALICIOUS|$SUSPICIOUS|$HARMLESS|$UNDETECTED|$DOWNLOAD_URL" >> /tmp/scan_results.txt
                  break
                fi
              done
            else
              echo "::warning::Failed to submit $NAME to VirusTotal"
              echo "$RESPONSE" | head -5
              echo "$NAME|?|?|?|?|$DOWNLOAD_URL" >> /tmp/scan_results.txt
            fi
          done
          
          # Check if any detections
          if [ "${HAS_DETECTIONS:-false}" = "true" ]; then
            echo "has_detections=true" >> $GITHUB_OUTPUT
          else
            echo "has_detections=false" >> $GITHUB_OUTPUT
          fi
          
          # Output results file path
          if [ -f /tmp/scan_results.txt ]; then
            cat /tmp/scan_results.txt
          fi

      - name: Create scan report
        id: report
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          
          echo "# VirusTotal Scan Report" > scan-report.md
          echo "" >> scan-report.md
          echo "**Release:** $TAG" >> scan-report.md
          echo "**Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> scan-report.md
          echo "**Repository:** ${{ github.repository }}" >> scan-report.md
          echo "" >> scan-report.md
          echo "## Scan Results" >> scan-report.md
          echo "" >> scan-report.md
          echo "| File | Malicious | Suspicious | Harmless | Undetected |" >> scan-report.md
          echo "|------|-----------|------------|----------|------------|" >> scan-report.md
          
          if [ -f /tmp/scan_results.txt ]; then
            while IFS='|' read -r name mal sus harm undet url; do
              echo "| [$name]($url) | $mal | $sus | $harm | $undet |" >> scan-report.md
            done < /tmp/scan_results.txt
          else
            echo "| No results | - | - | - | - |" >> scan-report.md
          fi
          
          echo "" >> scan-report.md
          echo "---" >> scan-report.md
          echo "*Automated scan by ReactorPro CI/CD*" >> scan-report.md
          
          cat scan-report.md
          
      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: virustotal-scan-report
          path: scan-report.md

  generate-submission-info:
    name: Generate AV Submission Info
    runs-on: ubuntu-latest
    needs: scan-virustotal
    steps:
      - name: Get release info
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "url=https://github.com/${{ github.repository }}/releases/tag/$TAG" >> $GITHUB_OUTPUT

      - name: Download Windows executable for hashing
        id: download
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          mkdir -p assets
          
          # Download just the Tauri Windows zip (smallest Windows binary)
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern "ReactorPro-Tauri-*-windows*.zip" \
            --dir assets || true
          
          ls -la assets/
          
          # Extract exe
          cd assets
          for zip in *.zip; do
            [ -f "$zip" ] && unzip -o "$zip" -d extracted || true
          done
          
          EXE=$(find . -name "*.exe" -type f | head -1)
          if [ -n "$EXE" ]; then
            echo "exe_found=true" >> $GITHUB_OUTPUT
            echo "exe_path=$EXE" >> $GITHUB_OUTPUT
          else
            echo "exe_found=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate file hashes
        id: hashes
        if: steps.download.outputs.exe_found == 'true'
        run: |
          EXE="${{ steps.download.outputs.exe_path }}"
          cd assets
          
          SHA256=$(sha256sum "$EXE" | awk '{print $1}')
          MD5=$(md5sum "$EXE" | awk '{print $1}')
          SHA1=$(sha1sum "$EXE" | awk '{print $1}')
          SIZE=$(stat -c%s "$EXE")
          FILENAME=$(basename "$EXE")
          
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "md5=$MD5" >> $GITHUB_OUTPUT
          echo "sha1=$SHA1" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Create submission report
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          URL="${{ steps.release.outputs.url }}"
          
          cat << 'EOF' > av-submission-report.md
          # AV Vendor Submission Report
          
          **Release:** TAG_PLACEHOLDER
          **Date:** DATE_PLACEHOLDER
          **Repository:** https://github.com/REPO_PLACEHOLDER
          
          ## File Information
          
          | Property | Value |
          |----------|-------|
          | Release | TAG_PLACEHOLDER |
          | Download | URL_PLACEHOLDER |
          | SHA256 | SHA256_PLACEHOLDER |
          | SHA1 | SHA1_PLACEHOLDER |
          | MD5 | MD5_PLACEHOLDER |
          
          ## Submission Links (in priority order)
          
          | # | Vendor | Submission URL | Priority |
          |---|--------|----------------|----------|
          | 1 | Microsoft Defender | https://www.microsoft.com/en-us/wdsi/filesubmission | Critical |
          | 2 | Google Safe Browsing | https://safebrowsing.google.com/safebrowsing/report_error/ | Critical |
          | 3 | Norton/Symantec | https://submit.norton.com/ | High |
          | 4 | McAfee | https://www.mcafee.com/enterprise/en-us/threat-center/threat-feedback.html | High |
          | 5 | Kaspersky | https://opentip.kaspersky.com/ | High |
          | 6 | Avast/AVG | https://www.avast.com/false-positive-file-form.php | High |
          | 7 | Bitdefender | https://www.bitdefender.com/submit/ | Medium |
          | 8 | ESET | https://support.eset.com/en/kb141 | Medium |
          | 9 | Trend Micro | https://www.trendmicro.com/en_us/about/legal/detection-reevaluation.html | Medium |
          | 10 | Malwarebytes | https://www.malwarebytes.com/support/fp | Medium |
          | 11 | Sophos | https://support.sophos.com/support/s/filesubmission | Low |
          | 12 | F-Secure | https://www.f-secure.com/en/business/support-and-downloads/submit-a-sample | Low |
          
          ## Submission Template
          
          Copy and paste this when submitting to each vendor:
          
          ---
          
          **Subject:** False Positive Report - ReactorPro Desktop Application
          
          **Body:**
          
          The ReactorPro application (SHA256: SHA256_PLACEHOLDER) is being incorrectly detected as malicious. This is a false positive.
          
          ReactorPro is a legitimate, open-source AI coding assistant for developers.
          
          - **GitHub:** https://github.com/REPO_PLACEHOLDER
          - **Website:** https://reactorpro.ng
          - **Vendor:** Hyperspace Technologies
          - **License:** MIT (Open Source)
          - **Download:** URL_PLACEHOLDER
          
          The application is:
          - Digitally signed by Hyperspace Technologies
          - Built via automated GitHub Actions CI/CD
          - Source code is publicly auditable
          
          Please review and whitelist this software.
          
          Thank you.
          
          ---
          EOF
          
          # Replace placeholders
          sed -i "s|TAG_PLACEHOLDER|$TAG|g" av-submission-report.md
          sed -i "s|DATE_PLACEHOLDER|$(date -u +%Y-%m-%dT%H:%M:%SZ)|g" av-submission-report.md
          sed -i "s|REPO_PLACEHOLDER|${{ github.repository }}|g" av-submission-report.md
          sed -i "s|URL_PLACEHOLDER|$URL|g" av-submission-report.md
          sed -i "s|SHA256_PLACEHOLDER|${{ steps.hashes.outputs.sha256 }}|g" av-submission-report.md
          sed -i "s|SHA1_PLACEHOLDER|${{ steps.hashes.outputs.sha1 }}|g" av-submission-report.md
          sed -i "s|MD5_PLACEHOLDER|${{ steps.hashes.outputs.md5 }}|g" av-submission-report.md
          
          cat av-submission-report.md

      - name: Upload submission report
        uses: actions/upload-artifact@v4
        with:
          name: av-submission-report
          path: av-submission-report.md

      - name: Create GitHub issue for submissions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          URL="${{ steps.release.outputs.url }}"
          SHA256="${{ steps.hashes.outputs.sha256 }}"
          
          # Check if issue already exists
          EXISTING=$(gh issue list --repo ${{ github.repository }} --search "AV Whitelist $TAG" --json number --jq '.[0].number // empty')
          
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already exists for $TAG"
            exit 0
          fi
          
          BODY=$(cat << EOF
          ## AV False Positive Submissions for $TAG
          
          ### File Information
          - **SHA256:** \`$SHA256\`
          - **Download:** $URL
          
          ### Submission Checklist
          
          Submit to each vendor and check off when done:
          
          #### Critical Priority
          - [ ] [Microsoft Defender](https://www.microsoft.com/en-us/wdsi/filesubmission) - Affects all Windows users
          - [ ] [Google Safe Browsing](https://safebrowsing.google.com/safebrowsing/report_error/) - Affects Chrome downloads
          
          #### High Priority  
          - [ ] [Norton/Symantec](https://submit.norton.com/)
          - [ ] [McAfee](https://www.mcafee.com/enterprise/en-us/threat-center/threat-feedback.html)
          - [ ] [Kaspersky](https://opentip.kaspersky.com/)
          - [ ] [Avast/AVG](https://www.avast.com/false-positive-file-form.php)
          
          #### Medium Priority
          - [ ] [Bitdefender](https://www.bitdefender.com/submit/)
          - [ ] [ESET](https://support.eset.com/en/kb141)
          - [ ] [Trend Micro](https://www.trendmicro.com/en_us/about/legal/detection-reevaluation.html)
          - [ ] [Malwarebytes](https://www.malwarebytes.com/support/fp)
          
          #### Low Priority
          - [ ] [Sophos](https://support.sophos.com/support/s/filesubmission)
          - [ ] [F-Secure](https://www.f-secure.com/en/business/support-and-downloads/submit-a-sample)
          
          ### Submission Template
          
          \`\`\`
          Subject: False Positive Report - ReactorPro Desktop Application
          
          The ReactorPro application (SHA256: $SHA256) is incorrectly detected as malicious.
          
          ReactorPro is a legitimate, open-source AI coding assistant.
          - GitHub: https://github.com/${{ github.repository }}
          - Website: https://reactorpro.ng  
          - Vendor: Hyperspace Technologies
          - License: MIT
          
          Please whitelist this software. Thank you.
          \`\`\`
          
          ---
          *Auto-generated by AV Scan workflow*
          EOF
          )
          
          gh issue create \
            --repo ${{ github.repository }} \
            --title "AV Whitelist Submissions for $TAG" \
            --body "$BODY" \
            --label "av-whitelist" || echo "Failed to create issue (label may not exist)"

  send-vendor-emails:
    name: Send Automated Emails to AV Vendors
    runs-on: ubuntu-latest
    needs: [scan-virustotal, generate-submission-info]
    if: ${{ inputs.send_emails == true }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release info
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "url=https://github.com/${{ github.repository }}/releases/tag/$TAG" >> $GITHUB_OUTPUT

      - name: Download Windows executable for hashing
        id: download
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          mkdir -p assets
          
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern "ReactorPro-Tauri-*-windows*.zip" \
            --dir assets || true
          
          cd assets
          for zip in *.zip; do
            [ -f "$zip" ] && unzip -o "$zip" -d extracted || true
          done
          
          EXE=$(find . -name "*.exe" -type f | head -1)
          if [ -n "$EXE" ]; then
            echo "exe_path=$EXE" >> $GITHUB_OUTPUT
            SHA256=$(sha256sum "$EXE" | awk '{print $1}')
            MD5=$(md5sum "$EXE" | awk '{print $1}')
            SHA1=$(sha1sum "$EXE" | awk '{print $1}')
            FILENAME=$(basename "$EXE")
            echo "sha256=$SHA256" >> $GITHUB_OUTPUT
            echo "md5=$MD5" >> $GITHUB_OUTPUT
            echo "sha1=$SHA1" >> $GITHUB_OUTPUT
            echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Send emails to AV vendors
        id: send_emails
        run: |
          if [ -z "$AGENTMAIL_API_KEY" ]; then
            echo "::warning::AGENTMAIL_API_KEY not set, skipping email automation"
            exit 0
          fi
          
          TAG="${{ steps.release.outputs.tag }}"
          URL="${{ steps.release.outputs.url }}"
          SHA256="${{ steps.download.outputs.sha256 }}"
          MD5="${{ steps.download.outputs.md5 }}"
          SHA1="${{ steps.download.outputs.sha1 }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          PRIORITY_FILTER="${{ inputs.priority_filter || 'high' }}"
          
          # Load vendor contacts
          VENDORS=$(cat .github/av-vendor-contacts.json)
          
          # Priority mapping for filtering
          priority_value() {
            case "$1" in
              critical) echo 4 ;;
              high) echo 3 ;;
              medium) echo 2 ;;
              low) echo 1 ;;
              *) echo 0 ;;
            esac
          }
          
          MIN_PRIORITY=$(priority_value "$PRIORITY_FILTER")
          
          # Email subject
          SUBJECT="False Positive Report - ReactorPro Desktop Application v${TAG}"
          
          # Email body template function
          create_email_body() {
            local VENDOR_NAME="$1"
            printf '%s\n\n' "Dear $VENDOR_NAME Security Team,"
            printf '%s\n\n' "I am writing to report a false positive detection for ReactorPro, a legitimate open-source desktop application."
            printf '%s\n\n' "FILE INFORMATION"
            printf '%s\n' "Application: ReactorPro Desktop"
            printf '%s\n' "Version: $TAG"
            printf '%s\n' "Filename: $FILENAME"
            printf '%s\n' "SHA256: $SHA256"
            printf '%s\n' "SHA1: $SHA1"
            printf '%s\n\n' "MD5: $MD5"
            printf '%s\n\n' "ABOUT REACTORPRO"
            printf '%s\n\n' "ReactorPro is an open-source AI coding assistant for developers."
            printf '%s\n' "Publisher: Hyperspace Technologies"
            printf '%s\n' "Website: https://reactorpro.ng"
            printf '%s\n' "Source Code: https://github.com/${{ github.repository }}"
            printf '%s\n' "License: MIT (Open Source)"
            printf '%s\n\n' "Download: $URL"
            printf '%s\n\n' "SECURITY ASSURANCES"
            printf '%s\n' "1. Digitally Signed: The application is signed with a valid code signing certificate issued to Hyperspace Technologies"
            printf '%s\n' "2. Open Source: Full source code is publicly available and auditable on GitHub"
            printf '%s\n' "3. CI/CD Built: All binaries are built automatically via GitHub Actions with full transparency"
            printf '%s\n\n' "4. No Malicious Behavior: The application does not contain any malicious code, adware, or unwanted behavior"
            printf '%s\n\n' "REQUEST"
            printf '%s\n\n' "Please review this file and remove the false positive detection. Our users are being incorrectly warned about a safe, legitimate application."
            printf '%s\n\n' "If you require any additional information or the actual binary file, please let me know and I will provide it promptly."
            printf '%s\n\n' "Thank you for your time and assistance."
            printf '%s\n' "Best regards,"
            printf '%s\n' "ReactorPro Development Team"
            printf '%s\n' "Hyperspace Technologies"
            printf '%s\n' "https://reactorpro.ng"
          }
          
          # Track sent emails
          SENT_COUNT=0
          FAILED_COUNT=0
          SKIPPED_COUNT=0
          
          echo "## Email Submission Report" > email-report.md
          echo "" >> email-report.md
          echo "**Release:** $TAG" >> email-report.md
          echo "**Priority Filter:** $PRIORITY_FILTER" >> email-report.md
          echo "**Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> email-report.md
          echo "" >> email-report.md
          echo "| Vendor | Email | Status |" >> email-report.md
          echo "|--------|-------|--------|" >> email-report.md
          
          # Process each vendor
          echo "$VENDORS" | jq -r '.vendors[] | @base64' | while read -r vendor_b64; do
            VENDOR=$(echo "$vendor_b64" | base64 -d)
            NAME=$(echo "$VENDOR" | jq -r '.name')
            EMAIL=$(echo "$VENDOR" | jq -r '.email // empty')
            PRIORITY=$(echo "$VENDOR" | jq -r '.priority')
            
            VENDOR_PRIORITY=$(priority_value "$PRIORITY")
            
            # Skip if priority too low
            if [ "$VENDOR_PRIORITY" -lt "$MIN_PRIORITY" ]; then
              echo "Skipping $NAME (priority: $PRIORITY < $PRIORITY_FILTER)"
              echo "| $NAME | - | Skipped (priority) |" >> email-report.md
              continue
            fi
            
            # Skip if no email
            if [ -z "$EMAIL" ] || [ "$EMAIL" = "null" ]; then
              echo "Skipping $NAME (no email address)"
              echo "| $NAME | - | Skipped (web-only) |" >> email-report.md
              continue
            fi
            
            echo "=========================================="
            echo "Sending to: $NAME <$EMAIL>"
            
            # Create email body
            BODY=$(create_email_body "$NAME")
            
            # Send via AgentMail API
            RESPONSE=$(curl -s -X POST \
              "https://api.cyberagent.ng/v0/inboxes/${SENDER_EMAIL}/messages/send" \
              -H "Authorization: Bearer $AGENTMAIL_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg to "$EMAIL" \
                --arg subject "$SUBJECT" \
                --arg body "$BODY" \
                '{
                  "to": $to,
                  "subject": $subject,
                  "text": $body
                }')" 2>&1)
            
            # Check response
            MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.id // .message_id // empty' 2>/dev/null)
            ERROR=$(echo "$RESPONSE" | jq -r '.error // .message // empty' 2>/dev/null)
            
            if [ -n "$MESSAGE_ID" ] && [ "$MESSAGE_ID" != "null" ]; then
              echo "SUCCESS: Sent to $EMAIL (ID: $MESSAGE_ID)"
              echo "| $NAME | $EMAIL | Sent |" >> email-report.md
              SENT_COUNT=$((SENT_COUNT + 1))
            else
              echo "FAILED: $EMAIL - $ERROR"
              echo "$RESPONSE" | head -3
              echo "| $NAME | $EMAIL | Failed |" >> email-report.md
              FAILED_COUNT=$((FAILED_COUNT + 1))
            fi
            
            # Rate limit - wait 2 seconds between emails
            sleep 2
          done
          
          echo "" >> email-report.md
          echo "---" >> email-report.md
          echo "*Automated by ReactorPro AV Whitelist Workflow*" >> email-report.md
          
          echo "=========================================="
          echo "Email sending complete"
          cat email-report.md

      - name: Upload email report
        uses: actions/upload-artifact@v4
        with:
          name: email-submission-report
          path: email-report.md

      - name: Update GitHub issue with email status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          
          # Find the issue
          ISSUE_NUM=$(gh issue list --repo ${{ github.repository }} --search "AV Whitelist $TAG" --json number --jq '.[0].number // empty')
          
          if [ -n "$ISSUE_NUM" ] && [ -f email-report.md ]; then
            # Build comment body
            {
              echo "## Automated Email Submissions"
              echo ""
              echo "Emails were automatically sent to AV vendors on $(date -u +%Y-%m-%dT%H:%M:%SZ)."
              echo ""
              cat email-report.md
            } > /tmp/issue-comment.md
            
            gh issue comment "$ISSUE_NUM" \
              --repo ${{ github.repository }} \
              --body-file /tmp/issue-comment.md
            
            echo "Updated issue #$ISSUE_NUM with email report"
          fi
