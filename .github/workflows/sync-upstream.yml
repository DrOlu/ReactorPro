name: Sync from Upstream

on:
  schedule:
    # Run every 4 hours — picks up upstream aider-desk releases faster
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no upstream changes'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: write
  packages: write

env:
  UPSTREAM_REPO: hotovo/aider-desk
  UPSTREAM_BRANCH: main

jobs:
  sync-and-rebrand:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}
      new_version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout ReactorPro
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}

      - name: Check for upstream changes
        id: check_changes
        run: |
          # Get the last synced upstream commit (stored in .upstream-commit)
          LAST_SYNCED=""
          if [ -f .upstream-commit ]; then
            LAST_SYNCED=$(cat .upstream-commit)
          fi
          
          UPSTREAM_HEAD=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})
          
          echo "Last synced: $LAST_SYNCED"
          echo "Upstream HEAD: $UPSTREAM_HEAD"
          
          if [ "$LAST_SYNCED" = "$UPSTREAM_HEAD" ] && [ "${{ inputs.force_rebuild }}" != "true" ]; then
            echo "No upstream changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Upstream changes detected or force rebuild requested"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "upstream_commit=$UPSTREAM_HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # Create a temporary branch for merging
          git checkout -B sync-upstream
          
          # Backup our workflow files and icons
          mkdir -p /tmp/workflow-backup
          mkdir -p /tmp/icons-backup
          cp -r .github/workflows/* /tmp/workflow-backup/ 2>/dev/null || true
          cp -r build/icon.* /tmp/icons-backup/ 2>/dev/null || true
          cp -r resources/icon.* /tmp/icons-backup/ 2>/dev/null || true
          cp build/splash.mp4 /tmp/icons-backup/ 2>/dev/null || true
          cp build/splash.png /tmp/icons-backup/ 2>/dev/null || true
          
          # Merge upstream, preferring upstream for conflicts in most files
          git merge upstream/${{ env.UPSTREAM_BRANCH }} \
            -X theirs \
            --no-edit \
            --allow-unrelated-histories || true
          
          # If there are conflicts, resolve them
          if git status | grep -q "Unmerged paths"; then
            echo "Resolving merge conflicts..."
            git checkout --theirs . 2>/dev/null || true
            git add -A
          fi
          
          # Restore our workflow files
          cp -r /tmp/workflow-backup/* .github/workflows/ 2>/dev/null || true
          git add .github/workflows/

      - name: Setup Node
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply ReactorPro branding
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "Applying ReactorPro branding..."
          
          # ============================================
          # Package.json - Update names and branding
          # ============================================
          if [ -f package.json ]; then
            node -e "
              const pkg = require('./package.json');
              pkg.name = 'reactorpro';
              pkg.description = 'ReactorPro - AI coding agent for software engineers';
              pkg.author = 'Hyperspace Technologies <agent@reactorpro.ng>';
              pkg.homepage = 'https://reactorpro.ng';
              pkg.repository = { type: 'git', url: 'https://github.com/DrOlu/ReactorPro.git' };
              
              // Update scripts that reference old file names
              if (pkg.scripts) {
                for (const [key, value] of Object.entries(pkg.scripts)) {
                  if (typeof value === 'string') {
                    pkg.scripts[key] = value
                      .replace(/aider-desk-mcp-server/g, 'reactorpro-mcp-server')
                      .replace(/aider-desk/g, 'reactorpro')
                      .replace(/aiderdesk/g, 'reactorpro');
                  }
                }
              }
              
              // Restore @aiderdesk scoped workspace package references
              if (pkg.dependencies) {
                for (const [key, value] of Object.entries(pkg.dependencies)) {
                  if (key.startsWith('@reactorpro/')) {
                    const originalKey = key.replace('@reactorpro/', '@aiderdesk/');
                    pkg.dependencies[originalKey] = value;
                    delete pkg.dependencies[key];
                    console.log('Restored workspace dep: ' + originalKey);
                  }
                }
              }
              
              require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
          fi
          
          # ============================================
          # electron-builder.yml
          # ============================================
          if [ -f electron-builder.yml ]; then
            sed -i 's/com.hotovo.aider-desk/ng.hyperspace.reactorpro/g' electron-builder.yml
            sed -i 's/productName: aider-desk/productName: ReactorPro/g' electron-builder.yml
            sed -i 's/executableName: aider-desk/executableName: reactorpro/g' electron-builder.yml
            sed -i 's/maintainer: Hotovo/maintainer: Hyperspace Technologies/g' electron-builder.yml
          fi

      - name: Pin dependencies for patch compatibility
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "Pinning dependencies to match patch file versions..."
          
          # Pin versions and add overrides for transitive dependencies
          # This ensures patch-package can apply patches correctly
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            
            // Direct dependencies to pin
            const pinsRequired = {
              '@tanstack/react-virtual': '3.13.12'
            };
            
            // Overrides for transitive dependencies (npm 8.3+)
            // This forces ALL installations of these packages to use specific versions
            const overridesRequired = {
              '@tanstack/virtual-core': '3.13.12'
            };
            
            let changed = false;
            
            // Pin direct dependencies
            for (const [pkgName, version] of Object.entries(pinsRequired)) {
              if (pkg.dependencies && pkg.dependencies[pkgName] && pkg.dependencies[pkgName] !== version) {
                console.log('Pinning ' + pkgName + ' from ' + pkg.dependencies[pkgName] + ' to ' + version);
                pkg.dependencies[pkgName] = version;
                changed = true;
              }
              if (pkg.devDependencies && pkg.devDependencies[pkgName] && pkg.devDependencies[pkgName] !== version) {
                console.log('Pinning ' + pkgName + ' from ' + pkg.devDependencies[pkgName] + ' to ' + version);
                pkg.devDependencies[pkgName] = version;
                changed = true;
              }
            }
            
            // Add overrides for transitive dependencies
            if (!pkg.overrides) {
              pkg.overrides = {};
              changed = true;
            }
            for (const [pkgName, version] of Object.entries(overridesRequired)) {
              if (pkg.overrides[pkgName] !== version) {
                console.log('Adding override for ' + pkgName + ' to ' + version);
                pkg.overrides[pkgName] = version;
                changed = true;
              }
            }
            
            if (changed) {
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
              console.log('Dependencies and overrides configured successfully');
            } else {
              console.log('No changes needed');
            }
          "

      - name: Re-inject built-in claude-agent-sdk provider dependency
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # ReactorPro keeps a built-in `src/main/models/providers/claude-agent-sdk.ts`
          # provider that upstream has moved into a standalone extension
          # (packages/extensions/extensions/claude-agent-sdk). The extension declares
          # `ai-sdk-provider-claude-code` in its own package.json, but that is NOT a
          # workspace member, so it never lands in the root node_modules and the root
          # `build:server` (incl. the Docker image) fails with:
          #   Rollup failed to resolve import "ai-sdk-provider-claude-code".
          # The -X theirs merge + rebrand regenerates package.json from upstream, which
          # does not carry this dependency, so we re-inject it here on every sync.
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            const dep = 'ai-sdk-provider-claude-code';
            const version = '4.0.1';
            pkg.dependencies = pkg.dependencies || {};
            if (pkg.dependencies[dep] !== version) {
              console.log('Re-injecting ' + dep + '@' + version + ' (was: ' + pkg.dependencies[dep] + ')');
              pkg.dependencies[dep] = version;
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            } else {
              console.log(dep + '@' + version + ' already present');
            }
          "

      - name: Rename files for branding
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "Renaming files that contain 'aider-desk' in their names..."
          
          # Rename files containing 'aider-desk' to 'reactorpro'
          find . -type f -name "*aider-desk*" ! -path "./.git/*" | while read file; do
            newname=$(echo "$file" | sed 's/aider-desk/reactorpro/g')
            if [ "$file" != "$newname" ]; then
              mkdir -p "$(dirname "$newname")"
              git mv "$file" "$newname" 2>/dev/null || mv "$file" "$newname"
              echo "Renamed: $file -> $newname"
            fi
          done
          
          # Rename directories containing 'aider-desk' (do deepest first)
          find . -type d -name "*aider-desk*" ! -path "./.git/*" -depth | while read dir; do
            newname=$(echo "$dir" | sed 's/aider-desk/reactorpro/g')
            if [ "$dir" != "$newname" ]; then
              git mv "$dir" "$newname" 2>/dev/null || mv "$dir" "$newname"
              echo "Renamed dir: $dir -> $newname"
            fi
          done

      - name: Apply source code branding
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "Applying source code branding changes..."
          
          # ============================================
          # Source files - visible strings only
          # ============================================
          find src -type f \( -name "*.ts" -o -name "*.tsx" \) -exec sed -i \
            -e 's/AiderDesk/ReactorPro/g' \
            -e 's/Aider Desk/ReactorPro/g' \
            -e 's/aider-desk/reactorpro/g' \
            -e 's/aiderdesk/reactorpro/g' {} \;
          
          # Restore @aiderdesk scoped package references that were incorrectly renamed
          find src packages -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.json" \) -exec sed -i \
            -e 's/@reactorpro\/extensions/@aiderdesk\/extensions/g' \
            -e 's/@reactorpro\/tree-sitter-utils/@aiderdesk\/tree-sitter-utils/g' {} \;
          
          # Update Hotovo references
          find src -type f \( -name "*.ts" -o -name "*.tsx" \) -exec sed -i \
            -e 's/Hotovo/Hyperspace Technologies/g' \
            -e 's/hotovo/hyperspace/g' {} \;
          
          # Update URLs
          find src -type f \( -name "*.ts" -o -name "*.tsx" \) -exec sed -i \
            -e 's|aiderdesk.hotovo.com|reactorpro.ng|g' \
            -e 's|hotovo/aider-desk|DrOlu/ReactorPro|g' {} \;
          
          # ============================================
          # HTML files
          # ============================================
          find src -name "*.html" -type f -exec sed -i \
            -e 's/AiderDesk/ReactorPro/g' \
            -e 's/aider-desk/reactorpro/g' {} \;
          
          # ============================================
          # README.md
          # ============================================
          if [ -f README.md ]; then
            sed -i 's/AiderDesk/ReactorPro/g' README.md
            sed -i 's/aider-desk/reactorpro/g' README.md
            sed -i 's/Aider Desk/ReactorPro/g' README.md
            sed -i 's/aider desk/ReactorPro/g' README.md
            sed -i 's/hotovo\/aider-desk/DrOlu\/ReactorPro/g' README.md
            sed -i 's/Hotovo/Hyperspace Technologies/g' README.md
            sed -i 's/aiderdesk.hotovo.com/reactorpro.ng/g' README.md
          fi
          
          # ============================================
          # docs-site
          # ============================================
          if [ -d docs-site ]; then
            find docs-site -type f \( -name "*.md" -o -name "*.json" -o -name "*.js" -o -name "*.ts" -o -name "*.tsx" \) -exec sed -i \
              -e 's/AiderDesk/ReactorPro/g' \
              -e 's/aider-desk/reactorpro/g' \
              -e 's/Aider Desk/ReactorPro/g' \
              -e 's/Hotovo/Hyperspace Technologies/g' \
              -e 's/hotovo/hyperspace/g' \
              -e 's|aiderdesk.hotovo.com|reactorpro.ng|g' {} \;
          fi
          
          # ============================================
          # AGENTS.md
          # ============================================
          if [ -f AGENTS.md ]; then
            sed -i -e 's/AiderDesk/ReactorPro/g' -e 's/aider-desk/reactorpro/g' AGENTS.md
          fi
          
          # ============================================
          # Dockerfile
          # ============================================
          if [ -f Dockerfile ]; then
            sed -i -e 's/aider-desk/reactorpro/g' -e 's/AiderDesk/ReactorPro/g' Dockerfile
          fi
          
          # ============================================
          # Locale files - Update branding in i18n
          # ============================================
          if [ -f src/common/locales/en.json ]; then
            sed -i 's/AiderDesk/ReactorPro/g' src/common/locales/en.json
            sed -i 's/AI-assisted coding/AI platform for Professionals/g' src/common/locales/en.json
          fi
          if [ -f src/common/locales/zh.json ]; then
            sed -i 's/AiderDesk/ReactorPro/g' src/common/locales/zh.json
          fi

      - name: Patch cerebras into PROVIDER_PARAMETERS_MAP
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # Upstream has cerebras in AVAILABLE_PROVIDERS and PROVIDER_ICON_MAP but
          # forgot it in PROVIDER_PARAMETERS_MAP. The -X theirs merge drops our fix
          # every sync, so we re-inject it here before the verification check.
          node -e "
            const fs = require('fs');
            const f = 'src/renderer/src/components/ModelLibrary/ProviderProfileForm.tsx';
            let src = fs.readFileSync(f, 'utf8');
            if (/cerebras:\s*CerebrasParameters/.test(src)) {
              console.log('cerebras already in PROVIDER_PARAMETERS_MAP, skipping');
              process.exit(0);
            }
            const lines = src.split('\\n');
            const out = [];
            let inImports = false;
            let addedImport = false;
            let addedMap = false;
            for (const line of lines) {
              out.push(line);
              if (/^import\s*\{\s*$/.test(line.trim())) {
                inImports = true;
                continue;
              }
              if (inImports && !addedImport && /^\s+BedrockParameters,\s*$/.test(line)) {
                out.push('  CerebrasParameters,');
                addedImport = true;
                console.log('Added CerebrasParameters to imports');
              }
              if (inImports && /^\}\s*from/.test(line.trim())) {
                inImports = false;
              }
              if (!addedMap && /^\s+bedrock:\s*BedrockParameters,\s*$/.test(line)) {
                out.push('  cerebras: CerebrasParameters,');
                addedMap = true;
                console.log('Added cerebras: CerebrasParameters to PROVIDER_PARAMETERS_MAP');
              }
            }
            if (addedImport || addedMap) {
              fs.writeFileSync(f, out.join('\\n'));
              console.log('Patched ProviderProfileForm.tsx for cerebras provider');
            } else {
              console.error('WARNING: could not patch cerebras');
              process.exit(1);
            }
          "

      - name: Verify provider UI maps cover AVAILABLE_PROVIDERS
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          echo "Verifying every provider in AVAILABLE_PROVIDERS has an icon and parameters component..."
          node -e "
            const fs = require('fs');
            function read(p) { return fs.readFileSync(p, 'utf8'); }

            // Parse AVAILABLE_PROVIDERS array from agent.ts
            const agentSrc = read('packages/common/src/agent.ts');
            const m = agentSrc.match(/AVAILABLE_PROVIDERS[\s\S]*?=\s*\[([\s\S]*?)\];/);
            if (!m) { console.error('Could not parse AVAILABLE_PROVIDERS'); process.exit(1); }
            const providers = [...m[1].matchAll(/'([^']+)'/g)].map(x => x[1]);

            // Parse keys from PROVIDER_ICON_MAP in ProviderSelection.tsx
            const selSrc = read('src/renderer/src/components/ModelLibrary/ProviderSelection.tsx');
            const iconBlock = selSrc.match(/PROVIDER_ICON_MAP[\s\S]*?\{([\s\S]*?)\};/);
            // Match both single-quoted keys ('alibaba-plan') and unquoted identifier keys (anthropic).
            // The previous /'([^']+)'/g only matched quoted keys and falsely reported every
            // unquoted identifier (anthropic, azure, openai, ...) as missing on every sync.
            const iconKeys = iconBlock ? [...iconBlock[1].matchAll(/^\s*(?:'([^']+)'|([A-Za-z][\w-]*))\s*:/gm)].map(m => m[1] || m[2]).filter(Boolean) : [];

            // Parse keys from PROVIDER_PARAMETERS_MAP in ProviderProfileForm.tsx
            const formSrc = read('src/renderer/src/components/ModelLibrary/ProviderProfileForm.tsx');
            const paramBlock = formSrc.match(/PROVIDER_PARAMETERS_MAP[\s\S]*?\{([\s\S]*?)\};/);
            const paramKeys = paramBlock ? [...paramBlock[1].matchAll(/^\s*(?:'([^']+)'|([A-Za-z][\w-]*))\s*:/gm)].map(m => m[1] || m[2]).filter(Boolean) : [];

            const missingIcons = providers.filter(p => !iconKeys.includes(p));
            const missingParams = providers.filter(p => !paramKeys.includes(p));
            if (missingIcons.length || missingParams.length) {
              console.error('Provider UI map coverage check FAILED.');
              if (missingIcons.length) console.error('Missing from PROVIDER_ICON_MAP: ' + missingIcons.join(', '));
              if (missingParams.length) console.error('Missing from PROVIDER_PARAMETERS_MAP: ' + missingParams.join(', '));
              console.error('Add the missing icon/parameters components and locale strings, or remove the provider from AVAILABLE_PROVIDERS in packages/common/src/agent.ts. Otherwise the Add Provider screen will crash with React error #130.');
              process.exit(1);
            }
            console.log('OK: all ' + providers.length + ' providers have icon + parameters components.');
          "

      - name: Copy ReactorPro icons
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # Restore icons from backup
          if [ -d /tmp/icons-backup ]; then
            echo "Restoring ReactorPro icons..."
            cp /tmp/icons-backup/icon.* build/ 2>/dev/null || true
            cp /tmp/icons-backup/icon.png resources/ 2>/dev/null || true
            cp /tmp/icons-backup/splash.mp4 build/ 2>/dev/null || true
            cp /tmp/icons-backup/splash.png build/ 2>/dev/null || true
          fi

      - name: Determine version
        if: steps.check_changes.outputs.has_changes == 'true'
        id: version
        run: |
          UPSTREAM_VERSION=$(node -p "require('./package.json').version")
          echo "Upstream version: $UPSTREAM_VERSION"
          echo "version=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Save upstream commit marker
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "${{ steps.check_changes.outputs.upstream_commit }}" > .upstream-commit

      - name: Update package-lock.json with overrides
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "Updating package-lock.json to apply overrides..."
          # Use npm install with --package-lock-only and --ignore-scripts to update the lock file
          # --ignore-scripts prevents postinstall from running (which needs full build env)
          npm install --package-lock-only --ignore-scripts --legacy-peer-deps || true

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # Restore workflow files
          if [ -d /tmp/workflow-backup ]; then
            cp -r /tmp/workflow-backup/* .github/workflows/
          fi
          
          git add -A
          
          UPSTREAM_COMMIT="${{ steps.check_changes.outputs.upstream_commit }}"
          SHORT_COMMIT="${UPSTREAM_COMMIT:0:7}"
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Sync from upstream aider-desk ($SHORT_COMMIT)

          - Merged latest changes from ${{ env.UPSTREAM_REPO }}
          - Applied ReactorPro branding
          - Updated package names and configurations
          
          Upstream commit: $UPSTREAM_COMMIT"
          fi
          
          git checkout main
          git fetch origin main
          git merge origin/main --no-edit || echo "Nothing to forward-merge"
          
          # Pull latest from origin to handle concurrent pushes
          git pull origin main --no-edit || true
          
          mkdir -p /tmp/main-workflows
          cp -r .github/workflows/* /tmp/main-workflows/ 2>/dev/null || true
          
          git merge sync-upstream --no-edit || echo "Nothing to merge"
          
          cp -r /tmp/main-workflows/* .github/workflows/ 2>/dev/null || true
          
          if ! git diff --quiet .github/workflows/; then
            git add .github/workflows/
            git commit --amend --no-edit
          fi
          
          git push origin main

  trigger-release:
    needs: sync-and-rebrand
    if: needs.sync-and-rebrand.outputs.has_changes == 'true'
    uses: ./.github/workflows/release.yml
    secrets: inherit
