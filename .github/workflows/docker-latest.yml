name: Docker Latest Tag

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag as latest (e.g. v0.69.0-dev)'
        required: false
        type: string

jobs:
  tag-latest:
    name: Tag Docker image as latest
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false

    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Tag multi-platform image as latest
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.event.release.tag_name }}"
          fi
          VERSION=${VERSION#v}
          
          docker buildx imagetools create --tag ${IMAGE_NAME}:latest ${IMAGE_NAME}:${VERSION}
          
          echo "Tagged multi-platform ${IMAGE_NAME}:${VERSION} as ${IMAGE_NAME}:latest"
