name: Build and Upload Binaries

on:
  workflow_call:
    inputs:
      version:
        description: "Version to apply to workspace packages (release builds)"
        required: false
        default: ""
        type: string
      tag:
        description: "Git tag to upload assets to (release builds)"
        required: false
        default: ""
        type: string
      release_name:
        description: "Release name (unused here, for context)"
        required: false
        default: ""
        type: string
      upload:
        description: "Upload built artifacts to the GitHub release"
        required: false
        default: true
        type: boolean
      set_versions:
        description: "Run npm version to set workspace versions"
        required: false
        default: true
        type: boolean

# Permissions are intentionally omitted here so callers can choose
# least-privilege (e.g. dev CI uses read-only; releases grant write).

env:
  NODE_VERSION: 20

jobs:
  build-macos:
    runs-on: macos-15-intel
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ inputs.version }}
      TAG: ${{ inputs.tag }}
      SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
      SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set workspace versions
        if: ${{ inputs.set_versions && inputs.version != '' }}
        run: npm version ${VERSION} --workspaces --include-workspace-root --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: |
          # Use npm install instead of npm ci to handle rebranded package names
          npm install --workspaces --include=optional || npm install --include=optional

      - name: Ensure rollup native binary
        run: npm install @rollup/rollup-darwin-x64 --no-save

      - name: Reinstall electron-builder to fix nested dependencies
        run: |
          # Remove and reinstall electron-builder with all nested deps
          rm -rf node_modules/electron-builder node_modules/builder-util node_modules/app-builder-bin node_modules/app-builder-lib
          npm install electron-builder@24.13.3 app-builder-bin@5.0.0-alpha.11 --no-save --force
          # Verify binary exists
          ls -la node_modules/app-builder-bin/*/x64/ || ls -la node_modules/app-builder-bin/

      - name: Build macOS binaries (Electron)
        run: npm run build:mac --workspace @hyperspace/reactorpro-electron-app

      - name: Sign macOS app bundles
        if: ${{ env.SIGNING_CERT_BASE64 != '' && env.SIGNING_KEY_BASE64 != '' }}
        run: |
          set -eo pipefail
          
          # Decode certificate and key
          CERT_PATH="$RUNNER_TEMP/hyperspace.crt"
          KEY_PATH="$RUNNER_TEMP/hyperspace.key"
          echo "$SIGNING_CERT_BASE64" | base64 -d > "$CERT_PATH"
          echo "$SIGNING_KEY_BASE64" | base64 -d > "$KEY_PATH"
          
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="temp_keychain_$(date +%s)"
          
          # Remove existing keychain if present
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Create P12 from cert and key for import
          P12_PATH="$RUNNER_TEMP/hyperspace.p12"
          openssl pkcs12 -export -out "$P12_PATH" -inkey "$KEY_PATH" -in "$CERT_PATH" -passout pass:temp -legacy 2>/dev/null || \
          openssl pkcs12 -export -out "$P12_PATH" -inkey "$KEY_PATH" -in "$CERT_PATH" -passout pass:temp
          
          # Import to keychain with all trust settings
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "temp" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          
          # Set partition list - this may fail for self-signed certs, continue anyway
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" 2>/dev/null || \
            echo "Warning: set-key-partition-list failed (expected for self-signed certs)"
          
          # Add to keychain search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          
          # Find available identities
          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          security find-identity -v "$KEYCHAIN_PATH" || true
          
          # Try to get identity, fall back to ad-hoc signing if not available
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" 2>/dev/null | grep -o '"[^"]*"' | head -1 | tr -d '"' || echo "")
          
          if [ -z "$IDENTITY" ]; then
            # Try without codesigning policy
            IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" 2>/dev/null | grep "Hyperspace" | grep -o '"[^"]*"' | head -1 | tr -d '"' || echo "")
          fi
          
          if [ -z "$IDENTITY" ]; then
            echo "No signing identity found, using ad-hoc signing"
            IDENTITY="-"
          else
            echo "Using identity: $IDENTITY"
          fi
          
          # Sign .app bundles inside zip files
          RELEASE_DIR="packages/electron-app/release"
          for zip in "$RELEASE_DIR"/*.zip; do
            [ -f "$zip" ] || continue
            echo "Processing: $zip"
            
            # Get absolute path for the zip
            ZIP_ABS="$(cd "$(dirname "$zip")" && pwd)/$(basename "$zip")"
            
            EXTRACT_DIR="$RUNNER_TEMP/extract_$(basename "$zip" .zip)"
            mkdir -p "$EXTRACT_DIR"
            unzip -q "$zip" -d "$EXTRACT_DIR"
            
            # Find and sign .app bundles
            find "$EXTRACT_DIR" -name "*.app" -type d | while read -r app; do
              echo "Signing: $app"
              # Sign with identity, fall back to ad-hoc if fails
              if ! codesign --deep --force --options runtime --timestamp --sign "$IDENTITY" "$app" 2>/dev/null; then
                echo "Certificate signing failed, using ad-hoc signing"
                codesign --deep --force --sign "-" "$app" || echo "Warning: ad-hoc signing also failed for $app"
              fi
              # Verify signature
              codesign --verify --verbose "$app" 2>/dev/null || echo "Verification skipped"
            done
            
            # Re-create the zip using absolute path
            rm -f "$ZIP_ABS"
            (cd "$EXTRACT_DIR" && zip -r -q "$ZIP_ABS" .)
            rm -rf "$EXTRACT_DIR"
          done
          
          # Cleanup
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$CERT_PATH" "$KEY_PATH" "$P12_PATH"

      - name: Upload release assets
        if: ${{ inputs.upload && inputs.tag != '' }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for file in packages/electron-app/release/*.zip; do
            [ -f "$file" ] || continue
            echo "Uploading $file"
            gh release upload "$TAG" "$file" --clobber
          done

  build-windows:
    runs-on: windows-2025
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ inputs.version }}
      TAG: ${{ inputs.tag }}
      SIGNING_CERT_PFX_BASE64: ${{ secrets.SIGNING_CERT_PFX_BASE64 }}
      SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set workspace versions
        if: ${{ inputs.set_versions && inputs.version != '' }}
        run: npm version ${{ env.VERSION }} --workspaces --include-workspace-root --no-git-tag-version --allow-same-version
        shell: bash

      - name: Install dependencies
        run: npm install --workspaces --include=optional || npm install --include=optional

      - name: Ensure rollup native binary
        run: npm install @rollup/rollup-win32-x64-msvc --no-save

      - name: Reinstall electron-builder to fix nested dependencies
        run: |
          # Remove and reinstall electron-builder with all nested deps
          Remove-Item -Recurse -Force node_modules/electron-builder, node_modules/builder-util, node_modules/app-builder-bin, node_modules/app-builder-lib -ErrorAction SilentlyContinue
          npm install electron-builder@24.13.3 app-builder-bin@5.0.0-alpha.11 --no-save --force
          # Verify binary exists
          Get-ChildItem -Recurse node_modules/app-builder-bin -Filter "*.exe" | Select-Object -First 5
        shell: pwsh

      - name: Build Windows binaries (Electron)
        run: npm run build:win --workspace @hyperspace/reactorpro-electron-app

      - name: Sign Windows executables
        if: ${{ env.SIGNING_CERT_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          # Decode certificate
          $certPath = "$env:RUNNER_TEMP\hyperspace.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:SIGNING_CERT_PFX_BASE64))
          
          # Find all executables in the release folder
          $releaseDir = "packages/electron-app/release"
          $exeFiles = Get-ChildItem -Path $releaseDir -Recurse -Filter "*.exe" -File -ErrorAction SilentlyContinue
          
          foreach ($exe in $exeFiles) {
            Write-Host "Signing $($exe.FullName)"
            try {
              $cert = Get-PfxCertificate -FilePath $certPath -Password (ConvertTo-SecureString -String $env:SIGNING_CERT_PASSWORD -AsPlainText -Force)
              Set-AuthenticodeSignature -FilePath $exe.FullName -Certificate $cert -TimestampServer "http://timestamp.digicert.com" -HashAlgorithm SHA256
              Write-Host "Successfully signed $($exe.Name)"
            } catch {
              Write-Warning "Failed to sign $($exe.Name): $_"
            }
          }
          
          # Also sign executables inside zip files by extracting, signing, and re-zipping
          $zipFiles = Get-ChildItem -Path $releaseDir -Filter "*.zip" -File -ErrorAction SilentlyContinue
          foreach ($zip in $zipFiles) {
            Write-Host "Processing ZIP: $($zip.Name)"
            $extractDir = "$env:RUNNER_TEMP\extract_$($zip.BaseName)"
            Expand-Archive -Path $zip.FullName -DestinationPath $extractDir -Force
            
            $innerExes = Get-ChildItem -Path $extractDir -Recurse -Filter "*.exe" -File
            foreach ($innerExe in $innerExes) {
              Write-Host "Signing (in ZIP) $($innerExe.FullName)"
              try {
                $cert = Get-PfxCertificate -FilePath $certPath -Password (ConvertTo-SecureString -String $env:SIGNING_CERT_PASSWORD -AsPlainText -Force)
                Set-AuthenticodeSignature -FilePath $innerExe.FullName -Certificate $cert -TimestampServer "http://timestamp.digicert.com" -HashAlgorithm SHA256
              } catch {
                Write-Warning "Failed to sign $($innerExe.Name): $_"
              }
            }
            
            # Re-create the zip
            Remove-Item $zip.FullName -Force
            Compress-Archive -Path "$extractDir\*" -DestinationPath $zip.FullName -Force
            Remove-Item $extractDir -Recurse -Force
          }
          
          # Cleanup
          Remove-Item $certPath -Force -ErrorAction SilentlyContinue

      - name: Upload release assets
        if: ${{ inputs.upload && inputs.tag != '' }}
        shell: pwsh
        run: |
          Get-ChildItem -Path "packages/electron-app/release" -Filter *.zip -File | ForEach-Object {
            Write-Host "Uploading $($_.FullName)"
            gh release upload $env:TAG $_.FullName --clobber
          }

