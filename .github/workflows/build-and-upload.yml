          npm install electron-builder@24.13.3 app-builder-bin@5.0.0-alpha.11 --no-save --force
          # Verify binary exists
          ls -la node_modules/app-builder-bin/linux/x64/ || ls -la node_modules/app-builder-bin/

      - name: Build Linux binaries (Electron)
        run: npm run build:linux --workspace @hyperspace/reactorpro-electron-app

      - name: Upload release assets
