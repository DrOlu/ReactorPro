  build-tauri-macos:
    runs-on: macos-15-intel
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ inputs.version }}
      TAG: ${{ inputs.tag }}
      SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
      SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust (Tauri)
        uses: dtolnay/rust-toolchain@stable

      - name: Set workspace versions
        if: ${{ inputs.set_versions && inputs.version != '' }}
        run: npm version ${VERSION} --workspaces --include-workspace-root --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm install --workspaces --include=optional || npm install --include=optional

      - name: Ensure rollup native binary
        run: npm install @rollup/rollup-darwin-x64 --no-save

      - name: Prebuild (Tauri)
        run: npm run prebuild --workspace @reactorpro/tauri-app

      - name: Ensure tauri native binary
        working-directory: packages/tauri-app
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if [ "$attempt" -gt 1 ]; then
              echo "Retrying Tauri CLI install (attempt $attempt)..."
            fi
            npm install @tauri-apps/cli@2.9.4 @tauri-apps/cli-darwin-x64@2.9.4 --no-save --no-audit --no-fund --workspaces=false
            node -e "require('@tauri-apps/cli'); console.log('Tauri CLI loaded')" && exit 0
          done
          echo "Tauri CLI failed to load after retries" >&2
          exit 1

      - name: Build macOS bundle (Tauri)
        working-directory: packages/tauri-app
        run: npm exec -- tauri build

      - name: Package Tauri artifacts (macOS)
        if: ${{ inputs.upload }}
        run: |
          set -euo pipefail
          BUNDLE_ROOT="packages/tauri-app/target/release/bundle"
          ARTIFACT_DIR="packages/tauri-app/release-tauri"
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"
          if [ -d "$BUNDLE_ROOT/macos/ReactorPro.app" ]; then
            ditto -ck --sequesterRsrc --keepParent "$BUNDLE_ROOT/macos/ReactorPro.app" "$ARTIFACT_DIR/ReactorPro-Tauri-${VERSION}-macos-x64.zip"
          fi

      - name: Sign Tauri macOS app bundles
        if: ${{ inputs.upload && env.SIGNING_CERT_BASE64 != '' && env.SIGNING_KEY_BASE64 != '' }}
        run: |
          set -eo pipefail
          
          CERT_PATH="$RUNNER_TEMP/hyperspace.crt"
          KEY_PATH="$RUNNER_TEMP/hyperspace.key"
          echo "$SIGNING_CERT_BASE64" | base64 -d > "$CERT_PATH"
          echo "$SIGNING_KEY_BASE64" | base64 -d > "$KEY_PATH"
          
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="temp_keychain_$(date +%s)"
          
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          P12_PATH="$RUNNER_TEMP/hyperspace.p12"
          openssl pkcs12 -export -out "$P12_PATH" -inkey "$KEY_PATH" -in "$CERT_PATH" -passout pass:temp -legacy 2>/dev/null || \
          openssl pkcs12 -export -out "$P12_PATH" -inkey "$KEY_PATH" -in "$CERT_PATH" -passout pass:temp
          
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "temp" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" 2>/dev/null || \
            echo "Warning: set-key-partition-list failed (expected for self-signed certs)"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          
          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          security find-identity -v "$KEYCHAIN_PATH" || true
          
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" 2>/dev/null | grep -o '"[^"]*"' | head -1 | tr -d '"' || echo "")
          if [ -z "$IDENTITY" ]; then
            IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" 2>/dev/null | grep "Hyperspace" | grep -o '"[^"]*"' | head -1 | tr -d '"' || echo "")
          fi
          if [ -z "$IDENTITY" ]; then
            echo "No signing identity found, using ad-hoc signing"
            IDENTITY="-"
          else
            echo "Using identity: $IDENTITY"
          fi
          
          ARTIFACT_DIR="packages/tauri-app/release-tauri"
          for zip in "$ARTIFACT_DIR"/*.zip; do
            [ -f "$zip" ] || continue
            echo "Processing: $zip"
            
            # Get absolute path for the zip
            ZIP_ABS="$(cd "$(dirname "$zip")" && pwd)/$(basename "$zip")"
            
            EXTRACT_DIR="$RUNNER_TEMP/extract_$(basename "$zip" .zip)"
            mkdir -p "$EXTRACT_DIR"
            unzip -q "$zip" -d "$EXTRACT_DIR"
            
            find "$EXTRACT_DIR" -name "*.app" -type d | while read -r app; do
              echo "Signing: $app"
              if ! codesign --deep --force --options runtime --timestamp --sign "$IDENTITY" "$app" 2>/dev/null; then
                echo "Certificate signing failed, using ad-hoc signing"
                codesign --deep --force --sign "-" "$app" || echo "Warning: ad-hoc signing also failed for $app"
              fi
              codesign --verify --verbose "$app" 2>/dev/null || echo "Verification skipped"
            done
            
            # Re-create the zip using absolute path
            rm -f "$ZIP_ABS"
            (cd "$EXTRACT_DIR" && zip -r -q "$ZIP_ABS" .)
            rm -rf "$EXTRACT_DIR"
          done
          
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$CERT_PATH" "$KEY_PATH" "$P12_PATH"

      - name: Upload Tauri release assets (macOS)
        if: ${{ inputs.upload && inputs.tag != '' }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for file in packages/tauri-app/release-tauri/*.zip; do
            [ -f "$file" ] || continue
            echo "Uploading $file"
            gh release upload "$TAG" "$file" --clobber
          done

